<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة دمج الفواكه 6x6 + Firebase</title>
<style>
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);margin:0;padding:15px;text-align:center;}
#startBtn,#googleLogin,#buyBtn{padding:15px 30px;font-size:20px;border:none;border-radius:10px;cursor:pointer;margin:10px}
#startBtn{background:#4CAF50;color:#fff}
#googleLogin{background:#4285F4;color:#fff}
#buyBtn{background:#FF9800;color:#fff}
#top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap}
#targetBox{font-size:24px;font-weight:bold}
#game{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-width:360px;width:90%;margin:15px auto}
.cell{background:#fff;border-radius:10px;height:50px;display:flex;justify-content:center;align-items:center;font-size:26px;cursor:pointer}
#activeUsers{font-weight:bold;margin:15px auto;}
</style>
</head>
<body>

<div id="userStatus">👤 أنت كزائر</div>
<button id="googleLogin">تجريبية حاليا</button>
<button id="startBtn">▶️ ابدأ اللعبة</button>

<div id="gameContainer" style="display:none;">
  <div id="top">
    <div id="scoreBox">⭐ نقاط: <span id="score">0</span></div>
    <div id="targetBox">🎯 الهدف: <span id="target"></span></div>
    <div id="daBox">💎 جواهر: <span id="da">0</span></div>
  </div>

  <div id="game"></div>

  <div id="activeUsers">🟢 المستخدمون النشطون: 0</div>

  <div id="purchase">
    <input type="number" id="buyAmount" placeholder="كمية الجواهر" style="width:120px;padding:8px;font-size:16px">
    <button id="buyBtn">شراء جوهرة ب 1 DA</button>
    <div style="font-size:12px;margin-top:5px;">السحب يبدأ من 1000 DA</div>
    <div style="font-size:12px;margin-top:5px;">رقم الحساب للدفع: 00799999000887214877</div>
  </div>
</div>

<audio id="sound">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5c4f1d6d7a.mp3">
</audio>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ===== حماية الموقع ===== */
const allowedHost = "freudd22-bot.github.io";
if(window.location.host !== allowedHost){
  alert("هذه اللعبة غير مصرح بتشغيلها هنا!");
  throw new Error("Host not allowed");
}

/* ===== Firebase Config ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBbdPvahZv6OSBumuFBd37mC61UXlsIm6k",
  authDomain: "naturebelkhirapp.firebaseapp.com",
  databaseURL: "https://naturebelkhirapp-default-rtdb.firebaseio.com",
  projectId: "naturebelkhirapp",
  storageBucket: "naturebelkhirapp.appspot.com",
  messagingSenderId: "318524052243",
  appId: "1:318524052243:web:5e14d79b0fa1eeef0280e6"
};
firebase.initializeApp(firebaseConfig);

const fruits=["🍎","🍌","🍊","🍓","🍐","🍅"];
const size=6;
let grid=[],selected=null;
let score=0,da=0,targetFruit="";
let user=null;

const game=document.getElementById("game");
const targetEl=document.getElementById("target");
const scoreEl=document.getElementById("score");
const daEl=document.getElementById("da");
const activeUsersEl=document.getElementById("activeUsers");

/* ===== Google Login ===== */
document.getElementById("googleLogin").onclick=async()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  const res=await firebase.auth().signInWithPopup(provider);
  user=res.user;
  document.getElementById("userStatus").textContent="👤 "+user.displayName;
  document.getElementById("googleLogin").style.display="none";
  loadGame();
  updateActiveUsers();
};

/* ===== Start Game ===== */
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("startBtn").style.display="none";
  document.getElementById("gameContainer").style.display="block";
  if(grid.length===0) initGrid();
  nextTarget();
  renderGrid();
};

/* ===== Game Logic ===== */
function initGrid(){
  grid=[];
  for(let r=0;r<size;r++){
    let row=[];
    for(let c=0;c<size;c++) row.push(randomFruit());
    grid.push(row);
  }
}

function randomFruit(){
  if(targetFruit && Math.random()<0.25) return targetFruit;
  return fruits[Math.floor(Math.random()*fruits.length)];
}

function renderGrid(){
  game.innerHTML="";
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=grid[r][c];
      cell.onclick=()=>selectCell(r,c);
      game.appendChild(cell);
    }
  }
}

function selectCell(r,c){
  if(!selected){ selected=[r,c]; return; }
  const [sr,sc]=selected;
  if(grid[sr][sc]===grid[r][c] && !(sr===r&&sc===c)){
    grid[sr][sc]=randomFruit();
    grid[r][c]=randomFruit();
    checkRows();
  }
  selected=null;
  renderGrid();
  saveGame();
}

function checkRows(){
  for(let r=0;r<size;r++){
    if(grid[r].every(f=>f===targetFruit)){
      grid[r]=grid[r].map(()=>randomFruit());
      score+=100; // نقاط
      scoreEl.textContent=score;
      document.getElementById("sound").play();
      nextTarget();
      break;
    }
  }
}

function nextTarget(){
  let t;
  do{ t=fruits[Math.floor(Math.random()*fruits.length)]; }
  while(t===targetFruit);
  targetFruit=t;
  targetEl.textContent=t;
}

/* ===== Firebase Save / Load ===== */
function saveGame(){
  if(!user) return;
  firebase.database().ref("games/"+user.uid).set({
    name:user.displayName,
    grid,score,da,targetFruit,
    lastActive:Date.now()
  });
}

function loadGame(){
  if(!user) return;
  firebase.database().ref("games/"+user.uid).once("value",snap=>{
    if(!snap.exists()) return;
    const d=snap.val();
    grid=d.grid||[];
    score=d.score||0;
    da=d.da||0;
    targetFruit=d.targetFruit||"";
    scoreEl.textContent=score;
    daEl.textContent=da;
    renderGrid();
  });
}

/* ===== Active Users Count ===== */
function updateActiveUsers(){
  firebase.database().ref("games")
    .orderByChild("lastActive")
    .startAt(Date.now()-300000) // آخر 5 دقائق
    .on("value", snap=>{
      const activeCount = snap.size; // عدد المستخدمين النشطين
      activeUsersEl.textContent = `🟢 المستخدمون النشطون: ${activeCount}`;
    });
}

/* ===== Purchase Gems (Manual Approval) ===== */
document.getElementById("buyBtn").onclick=()=>{
  let amount=parseInt(document.getElementById("buyAmount").value)||1;
  if(!user) return alert("سجل الدخول أولاً");
  // سجل الطلب في Firebase فقط
  firebase.database().ref("purchaseRequests").push({
    user:user.displayName,
    amount,
    timestamp:Date.now()
  });
  alert("تم طلب الشحن، انتظر التحقق");
};
</script>
</body>
</html>
