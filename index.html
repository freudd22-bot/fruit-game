<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الجواهر</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#222;
  font-size:18px;
}

.english{
  display:block;
  font-size:11px;
  opacity:0.7;
}

button{
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#googleLogin{background:#4285F4;color:white;}
#logoutBtn{background:#c0392b;color:white;display:none;}

.game{
  margin-top:20px;
}

.note{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}
</style>

<!-- حماية تشغيل الموقع فقط على دومينك -->
<script>
const allowedHost = "freudd22-bot.github.io";
if (location.hostname !== allowedHost) {
  document.write("غير مسموح بتشغيل اللعبة خارج الموقع الرسمي");
  throw new Error("Unauthorized Host");
}
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "PUT_YOUR_KEY",
  authDomain: "PUT_YOUR_AUTH",
  databaseURL: "PUT_YOUR_DB_URL",
  projectId: "PUT_YOUR_PROJECT",
};
firebase.initializeApp(firebaseConfig);
</script>

</head>
<body>

<div class="topbar">
  <div id="points">
    النقاط
    <span class="english">Points</span>
    <div id="pointsValue">0</div>
  </div>

  <div id="target">
    الهدف
    <span class="english">Target</span>
    <div id="targetValue">10</div>
  </div>

  <div id="gems">
    الجواهر
    <span class="english">Gems (1 = 1 DA)</span>
    <div id="gemsValue">0</div>
  </div>
</div>

<div style="margin-top:10px;">
  <button id="googleLogin">
    تسجيل الدخول
    <span class="english">Login</span>
  </button>

  <button id="logoutBtn">
    تسجيل الخروج
    <span class="english">Logout</span>
  </button>

  <div id="userStatus" style="margin-top:5px;"></div>

  <div id="activeUsers" style="margin-top:5px;">
    المستخدمون النشطون
    <span class="english">Active Users</span>
    : <span id="activeCount">0</span>
  </div>
</div>

<div class="game">
  <button onclick="addPoint()">اضغط</button>
</div>

<div class="note">
  املأ الصف أفقياً حسب الهدف
  <span class="english">Fill the row horizontally according to the target</span>
</div>

<script>
let user=null;
let points=0;
let target=10;
let gems=0;

/* تسجيل الدخول */
document.getElementById("googleLogin").onclick=()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:"select_account"});
  firebase.auth().signInWithRedirect(provider);
};

/* تسجيل الخروج بدون إعادة تحميل */
document.getElementById("logoutBtn").onclick=()=>{
  firebase.auth().signOut();
};

/* حالة المستخدم */
firebase.auth().onAuthStateChanged(u=>{
  if(u){
    user=u;
    document.getElementById("userStatus").innerHTML="👤 "+u.displayName;
    document.getElementById("googleLogin").style.display="none";
    document.getElementById("logoutBtn").style.display="inline-block";

    trackActiveUser();
    loadGems();
  }else{
    user=null;
    document.getElementById("userStatus").innerHTML="👤 زائر<span class='english'>Guest</span>";
    document.getElementById("googleLogin").style.display="inline-block";
    document.getElementById("logoutBtn").style.display="none";
  }
});

/* عداد المستخدمين النشطين */
function trackActiveUser(){
  const ref=firebase.database().ref("activeUsers/"+user.uid);
  ref.set(true);
  ref.onDisconnect().remove();

  firebase.database().ref("activeUsers").on("value",snap=>{
    document.getElementById("activeCount").innerText=snap.numChildren();
  });
}

/* تحميل الجواهر من قاعدة البيانات فقط */
function loadGems(){
  firebase.database().ref("users/"+user.uid+"/gems")
  .on("value",snap=>{
    gems=snap.val()||0;
    document.getElementById("gemsValue").innerText=gems;
  });
}

/* إضافة نقاط فقط */
function addPoint(){
  if(!user) return alert("سجل الدخول أولاً");

  points++;
  document.getElementById("pointsValue").innerText=points;

  if(points>=target){
    alert("🎉 وصلت للهدف!");
    points=0;
    document.getElementById("pointsValue").innerText=points;
  }
}
</script>

</body>
</html>
