name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting --project naturebelkhirapp
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
